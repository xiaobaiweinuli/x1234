name: Lint & Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  lint:
    name: Android Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
      - run: chmod +x gradlew
      - name: Stub secrets for lint
        run: |
          sed -i 's/YOUR_GITHUB_CLIENT_ID/stub_client_id/g' app/build.gradle.kts
          sed -i 's/YOUR_SUBDOMAIN/stub/g' app/build.gradle.kts
      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
