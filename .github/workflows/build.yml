name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "版本号 (如 1.2.0)"
        required: false
        default: ""
      release_type:
        description: "发布类型"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - "v*.*.*"

env:
  JAVA_VERSION: "17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout（fetch-depth: 0 确保 git cliff 能读完整历史）──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java ──
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: gradle

      # ── 3. Gradle 缓存 ──
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 4. 计算版本号 ──
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            echo "name=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "name=debug-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          fi
          # versionCode 使用 run_number，每次构建自动递增，无需手动维护
          echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ── 5. 生成 Changelog（仅 release 时执行）──
      - name: Generate Changelog
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      # ── 6. 权限 ──
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 7a. Debug 构建 ──
      - name: Build Debug APK
        if: ${{ github.event.inputs.release_type == 'debug' || !startsWith(github.ref, 'refs/tags/') }}
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CALLBACK_URL: ${{ secrets.OAUTH_CALLBACK_URL }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7b. Release 构建（需要签名）──
      - name: Decode Keystore
        if: ${{ github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/gitmob.keystore

      - name: Build Release APK
        if: ${{ github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CALLBACK_URL: ${{ secrets.OAUTH_CALLBACK_URL }}
          KEYSTORE_PATH: /tmp/gitmob.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 8. 上传 Artifact ──
      - name: Upload Debug APK
        if: ${{ github.event.inputs.release_type == 'debug' || !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: GitMob-debug-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        if: ${{ github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: GitMob-release-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── 9. 发布 GitHub Release ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.name) }}
          name: GitMob v${{ steps.version.outputs.name }}
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. 清理 keystore ──
      - name: Clean keystore
        if: always()
        run: rm -f /tmp/gitmob.keystore
