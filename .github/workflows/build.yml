name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "版本号 (如 1.2.0)"
        required: false
        default: ""
      release_type:
        description: "发布类型"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
  push:
    tags:
      - "v*.*.*"

env:
  JAVA_VERSION: "17"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  actions: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout (fetch-depth: 0 确保 git-cliff 能获取完整历史用于生成日志) ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Java 环境配置 ──
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"

      # ── 3. 专业的 Gradle 高性能缓存 (解决依赖下载慢和 R8 编译耗时问题) ──
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          # 即使构建失败（如 R8 报错）也保存已下载的依赖，方便下次快速重试
          cache-overwrite-existing: true

      # ── 4. 计算版本号 ──
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            echo "name=${{ github.event.inputs.version_name }}" >> $GITHUB_OUTPUT
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "name=debug-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          fi
          # versionCode 使用 GitHub Run Number 确保单调递增
          echo "code=${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ── 5. 生成 Changelog (仅在 Release 时执行) ──
      - name: Generate Changelog
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          VERSION_TAG: v${{ steps.version.outputs.name }}
        run: |
          # 配置临时 Git 用户，避免 tag 命令因身份缺失报错
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 如果当前提交没有 Tag (手动触发时)，创建一个本地临时 Tag 供 git-cliff 识别范围
          if ! git describe --tags --exact-match >/dev/null 2>&1; then
            echo "No tag found, creating temporary tag: $VERSION_TAG"
            git tag -f "$VERSION_TAG"
          fi

      - name: Run Git-Cliff
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md
          GITHUB_REPO: ${{ github.repository }}

      # ── 6. 权限处理 ──
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── 7a. Debug 构建 ──
      - name: Build Debug APK
        if: ${{ github.event.inputs.release_type == 'debug' || !startsWith(github.ref, 'refs/tags/') }}
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CALLBACK_URL: ${{ secrets.OAUTH_CALLBACK_URL }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7b. Release 构建 ──
      - name: Decode Keystore
        if: ${{ github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/gitmob.keystore

      - name: Build Release APK
        if: ${{ github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        env:
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CALLBACK_URL: ${{ secrets.OAUTH_CALLBACK_URL }}
          KEYSTORE_PATH: /tmp/gitmob.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 8. 上传构建产物 ──
      - name: Upload Debug APK
        if: ${{ github.event.inputs.release_type == 'debug' || !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: GitMob-debug-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload Release APK
        if: ${{ github.event.inputs.release_type == 'release' || startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: GitMob-release-${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      # ── 9. 发布 GitHub Release ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        uses: softprops/action-gh-release@v2
        with:
          # 优先使用 git tag，其次使用手动输入的 vX.Y.Z 格式
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.name) }}
          name: GitMob v${{ steps.version.outputs.name }}
          body_path: CHANGELOG_RELEASE.md
          draft: false
          prerelease: false
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. 清理敏感文件 ──
      - name: Clean keystore
        if: always()
        run: rm -f /tmp/gitmob.keystore
