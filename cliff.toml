# git cliff 配置文件
# 文档：https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
{% if commit.breaking %} ⚠️ BREAKING{% endif %}
{% if commit.body %}

{{ commit.body | indent(prefix="  ") }}
{% endif %}
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true   # 不符合规范的提交不显示（过滤历史脏提交）
split_commits = false
use_commit_body = true         # 显示 commit body 到 changelog
commit_preprocessors = []

commit_parsers = [
    { message = "^feat",     group = "✨ 新功能" },
    { message = "^fix",      group = "🐛 Bug 修复" },
    { message = "^perf",     group = "⚡ 性能优化" },
    { message = "^refactor", group = "🔨 重构" },
    { message = "^docs",     group = "📝 文档" },
    { message = "^style",    group = "🎨 样式" },
    { message = "^test",     group = "🧪 测试" },
    { message = "^chore",    group = "🔧 杂项" },
    { message = "^revert",   group = "⏪ 回退" },
    { message = "^ci",       group = "👷 CI/CD" },
    # 不匹配任何规范前缀的提交直接过滤掉
    { message = ".*",        skip = true },
]

# 只保留以下类型出现在 changelog 中（其余即使符合规范也过滤）
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
